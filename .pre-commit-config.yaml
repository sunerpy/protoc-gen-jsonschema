# See https://pre-commit.com for more information
# Run `make hooks` (or `pre-commit install`) once to enable.
repos:
  - repo: local
    hooks:
      - id: fmt
        name: fmt
        entry: make fmt
        language: system
        pass_filenames: false

      - id: lint
        name: lint
        entry: make lint
        language: system
        pass_filenames: false

      - id: buf-lint
        name: buf-lint
        entry: make buf-lint
        language: system
        pass_filenames: false
        files: '\.proto$'
